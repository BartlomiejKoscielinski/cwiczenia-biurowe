<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0f1a">
<title>Ćwiczenia Biurowe</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=JetBrains+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0c0f1a;color:#e2e8f0;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;
  max-width:480px;margin:0 auto;min-height:100dvh;
  background:linear-gradient(180deg,#0c0f1a,#111827 50%,#0f172a);
  overscroll-behavior:none;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer;border:none}
button:active{filter:brightness(1.15);transform:scale(0.97)}
a{text-decoration:none}a:active{filter:brightness(1.2)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
.hdr{padding:24px 20px 0;padding-top:max(24px,env(safe-area-inset-top))}
.tabs{display:flex;gap:3px;padding:12px 20px;position:sticky;top:0;background:linear-gradient(180deg,#0c0f1a 80%,transparent);z-index:10}
.tab{flex:1;padding:8px 4px;border-radius:10px;font-weight:600;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s}
.tab.on{background:rgba(110,231,183,.12);color:#6ee7b7}.tab:not(.on){background:rgba(255,255,255,.03);color:#64748b}
.cnt{padding:0 20px 32px}
.crd{border-radius:16px;overflow:hidden;transition:.3s;margin-bottom:8px}
.crd.off{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.crd.on{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.ch{width:100%;padding:16px 20px;background:0;text-align:left;display:flex;align-items:center;gap:14px}
.bdg{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.new{font-size:9px;font-weight:800;letter-spacing:1px;color:#fbbf24;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px}
.sb{width:48px;height:6px;border-radius:3px;background:rgba(255,255,255,.08)}.sf{height:100%;border-radius:3px;transition:.5s}
.cb{padding:0 20px 20px;animation:fadeIn .3s}
.cs{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:#cbd5e1;line-height:1.5}
.cn{width:20px;height:20px;border-radius:6px;flex-shrink:0;background:rgba(110,231,183,.1);color:#6ee7b7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.ei{font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.5;padding-left:12px;border-left:2px solid rgba(248,113,113,.2)}
.pl{font-size:12px;color:#64748b;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:6px;display:inline-block}
.yl{font-size:12px;color:#f87171;background:rgba(248,113,113,.08);padding:4px 10px;border-radius:6px;font-weight:600;display:inline-block}
.tr{position:relative;width:130px;height:130px}
.tt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:2px}
.tb{padding:8px 20px;border-radius:8px;font-weight:600;font-size:13px;transition:.2s}
.ts{background:rgba(110,231,183,.15);color:#6ee7b7}.tp{background:rgba(239,68,68,.15);color:#fca5a5}
.tre{background:rgba(255,255,255,.06);color:#94a3b8;padding:8px 14px}
.rc{background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px}
.bd{flex:1;padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(110,231,183,.15));color:#6ee7b7;transition:.2s}
.by{padding:12px 16px;border-radius:10px;background:rgba(248,113,113,.08);color:#f87171;font-weight:600;font-size:14px;display:flex;align-items:center}
.ps{flex:1;height:6px;border-radius:3px;border:none;cursor:pointer;transition:.3s}
.fb{padding:6px 12px;border-radius:6px;font-weight:600;font-size:12px}
.fb.on{background:rgba(255,255,255,.08);color:#e2e8f0}.fb:not(.on){background:0;color:#475569}
.sl{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.dn{text-align:center;padding:32px;background:rgba(34,197,94,.06);border-radius:16px}
.sx{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;text-align:center;flex:1}
.nc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:12px}
.svg-wrap{display:flex;justify-content:center;margin:14px 0 10px;padding:12px;background:rgba(0,0,0,.2);border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.svg-wrap svg{filter:drop-shadow(0 0 10px rgba(110,231,183,.12));max-width:100%}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
"use strict";
const h=React.createElement,{useState,useEffect,useRef}=React;

// ── Storage ──
const S={g(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
const today=()=>new Date().toISOString().slice(0,10);

// ── Audio ──
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach(t=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(.3,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+t+.12);o.start(a.currentTime+t);o.stop(a.currentTime+t+.12)});if(navigator.vibrate)navigator.vibrate([100,50,100,50,100])}catch(e){}}

// ── Smart Notifications (quiet hours aware) ──
let _niv=null;
const nPerm=()=>typeof Notification!=='undefined'?Notification.permission:'unavailable';
const nReq=cb=>{if(typeof Notification==='undefined')return cb('unavailable');Notification.requestPermission().then(cb)};

function inQuiet(cfg){
  const now=new Date(),h=now.getHours();
  const qs=cfg.qs||21, qe=cfg.qe||9;
  if(qs>qe) return h>=qs||h<qe; // e.g. 21-9: quiet from 21:00 to 08:59
  return h>=qs&&h<qe;
}

function tryNotify(cfg){
  if(nPerm()!=='granted')return;
  if(inQuiet(cfg))return; // silent during quiet hours
  const msgs=[
    {t:'⚡ Czas na mikro-przerwę!',b:'Wstań i rozciągnij się — 2 minuty dla kręgosłupa.'},
    {t:'🔄 Przerwa od ekranu!',b:'Chin tuck + rotacja piersiowa — Twoja szyja Ci podziękuje.'},
    {t:'💆 Rozruszaj barki!',b:'Wall Angel lub Doorway Stretch — otwórz klatkę piersiową.'},
    {t:'🤲 Zadbaj o nadgarstki!',b:'Nerve flossing nerwu pośrodkowego — profilaktyka cieśni.'},
    {t:'🎯 Mikro-przerwa!',b:'2 minuty ruchu = 2 godziny lepszego skupienia.'}
  ];
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  new Notification(m.t,{body:m.b,icon:'icon-192.png',tag:'mb',silent:false});
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}

function startN(cfg){
  stopN();
  if(nPerm()!=='granted')return;
  // Check immediately, then repeat
  tryNotify(cfg);
  _niv=setInterval(()=>tryNotify(cfg),(cfg.mins||90)*60*1000);
  S.s('ncfg',cfg);S.s('non',true);
}
function stopN(){if(_niv){clearInterval(_niv);_niv=null}S.s('non',false)}

// ── Tracker ──
function logDone(type){const d=S.g('tr',{});const k=today();if(!d[k])d[k]={m:0,s:0};d[k][type==='micro'?'m':'s']++;S.s('tr',d)}
function streak(){const d=S.g('tr',{});let s=0;const n=new Date();n.setHours(0,0,0,0);for(let i=0;i<365;i++){const dt=new Date(n);dt.setDate(dt.getDate()-i);if(d[dt.toISOString().slice(0,10)])s++;else break}return s}
function mData(y,m){const d=S.g('tr',{});const r=[];const f=new Date(y,m,1);const l=new Date(y,m+1,0);for(let i=1;i<=l.getDate();i++){const k=y+"-"+String(m+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");const v=d[k]||{m:0,s:0};r.push({day:i,k,mc:v.m,sc:v.s,t:v.m+v.s})}return{days:r,fd:(f.getDay()+6)%7}}

// ── SVG Illustrations ──
// Each returns an animated SVG showing the exercise position
// Body color scheme: #6ee7b7 (limbs), #4ade80 (accent/active), #334155 (floor/wall)
// All viewBox 0 0 120 100, rendered at 120x100

function svgEl(id){
const B="#6ee7b7",A="#4ade80",D="#334155";
const c=(...a)=>h(...a);
const vb="0 0 160 120";
const ln=(x1,y1,x2,y2,cl,w)=>c("line",{x1,y1,x2,y2,stroke:cl||B,strokeWidth:w||2.5,strokeLinecap:"round"});
const hd=(x,y)=>c("circle",{cx:x,cy:y,r:5.5,fill:B});
const jt=(x,y)=>c("circle",{cx:x,cy:y,r:2,fill:B});
const fl=c("line",{x1:8,y1:110,x2:152,y2:110,stroke:D,strokeWidth:1,opacity:.4,strokeDasharray:"5,4"});
const an=(attr,vals,dur)=>c("animate",{attributeName:attr,values:vals,dur:dur||"3s",repeatCount:"indefinite"});
const atr=(type,vals,dur,orig)=>c("animateTransform",{attributeName:"transform",type,values:vals,dur:dur||"3s",repeatCount:"indefinite",...(orig?{additive:"sum"}:{})});
const wrap=(children)=>c("svg",{viewBox:vb,width:160,height:120,xmlns:"http://www.w3.org/2000/svg"},children);

switch(id){

// 1: World's Greatest Stretch — side view, deep lunge + T-spine rotation
case 1: return wrap([fl,
  // Back leg extended
  ln(82,68,125,100), ln(125,100,138,108),
  // Front leg bent 90°
  ln(82,68,58,90), ln(58,90,58,108),
  jt(58,90), // front knee
  // Torso angled forward
  ln(82,68,60,42),
  jt(82,68), // hip
  // Head
  hd(55,36),
  // Left hand on floor
  ln(65,48,52,75), ln(52,75,48,90),
  // Right arm — ANIMATED rotation (the key movement)
  c("g",{style:{transformOrigin:"65px 48px"}},
    ln(65,48,78,32,A,2.5),
    ln(78,32,88,20,A,2.5),
    c("circle",{cx:88,cy:20,r:2,fill:A}),
    atr("rotate","-30;50;-30","3.5s")),
  // Rotation arc indicator
  c("path",{d:"M72 28 A18 18 0 0 1 90 38",stroke:A,strokeWidth:1,fill:"none",opacity:.3,strokeDasharray:"3,2"})
]);

// 2: Cat-Cow — side view on all fours, spine morphing
case 2: return wrap([fl,
  // Hands (static)
  ln(35,88,35,108), ln(35,88,35,80,B,2),
  // Knees/shins (static)
  ln(115,88,115,108), ln(115,88,115,80,B,2),
  // Spine — morphing between cow (arched down) and cat (rounded up)
  c("path",{d:"M35 80 C55 80 95 80 115 80",stroke:B,strokeWidth:3,fill:"none",
    children:an("d","M35 80 C55 68 95 68 115 80;M35 80 C55 92 95 92 115 80;M35 80 C55 68 95 68 115 80","4s")}),
  // Head — follows spine
  c("g",null,
    hd(28,76),
    an("cy","70;84;70","4s")),
  // Tail area
  c("g",null,
    ln(115,80,125,72,B,2),
    c("animate",{attributeName:"y2",values:"68;86;68",dur:"4s",repeatCount:"indefinite"})),
  // Labels
  c("text",{x:75,y:18,fill:A,fontSize:9,textAnchor:"middle",opacity:.5,
    children:[an("opacity","0;.7;0;0","4s")]},"cow ↓"),
  c("text",{x:75,y:18,fill:A,fontSize:9,textAnchor:"middle",opacity:0,
    children:[c("animate",{attributeName:"opacity",values:"0;0;.7;0",dur:"4s",repeatCount:"indefinite"})]},"cat ↑")
]);

// 3: Chin Tuck — side view seated on chair, head retracting
case 3: return wrap([
  // Chair
  c("rect",{x:68,y:48,width:35,height:50,rx:4,fill:D,opacity:.25}),
  c("rect",{x:95,y:28,width:8,height:70,rx:3,fill:D,opacity:.25}),
  // Legs on chair
  ln(78,82,65,105), ln(65,105,65,108),
  ln(78,82,90,105), ln(90,105,90,108),
  // Torso upright
  ln(78,82,78,48),
  jt(78,82),
  // Arms on lap
  ln(78,58,68,72), ln(68,72,72,82),
  // Neck + Head — ANIMATED retraction
  c("g",null,
    ln(78,48,78,38,B,2.2),
    hd(78,32),
    // Two fingers on chin (reference)
    ln(73,34,71,35,A,1.5),
    an("transform","translate(0,0);translate(-10,0);translate(0,0)","2.8s")),
  // Arrow showing retraction direction
  c("path",{d:"M66 28 L58 28",stroke:A,strokeWidth:1.5,fill:"none",markerEnd:"url(#ah)",opacity:.4,
    children:an("opacity",".2;.7;.2","2.8s")}),
  // Ghost of forward position
  c("circle",{cx:78,cy:32,r:5.5,fill:"none",stroke:B,strokeWidth:1,opacity:.15,strokeDasharray:"3,3"})
]);

// 4: Hip Flexor Stretch — side view half-kneeling with posterior pelvic tilt
case 4: return wrap([fl,
  // Back knee on ground
  ln(95,70,105,95), ln(105,95,118,108),
  jt(105,95), // back knee on floor
  c("circle",{cx:105,cy:108,r:3,fill:D,opacity:.3}), // padding
  // Front leg 90°
  ln(95,70,65,90), ln(65,90,65,108),
  jt(65,90), // front knee
  // Torso upright
  ln(95,70,90,35),
  jt(95,70), // hip
  // Head
  hd(88,28),
  // Front arm on knee
  ln(90,48,70,65),
  // Back arm — ANIMATED reaching overhead
  c("g",{style:{transformOrigin:"90px 48px"}},
    ln(90,48,95,28,A,2.2),
    ln(95,28,92,15,A,2.2),
    an("opacity",".5;1;.5","3.5s")),
  // Pelvic tilt arrow
  c("g",{opacity:.5},
    c("path",{d:"M100 75 Q98 80 95 76",stroke:A,strokeWidth:1.5,fill:"none"}),
    c("text",{x:108,y:80,fill:A,fontSize:7},"tilt"))
]);

// 5: Doorway Pec Stretch — front view in doorframe
case 5: return wrap([fl,
  // Doorframe
  ln(25,8,25,110,D,2.5), ln(135,8,135,110,D,2.5),
  c("line",{x1:25,y1:8,x2:135,y2:8,stroke:D,strokeWidth:2.5}),
  // Legs
  ln(75,75,65,108), ln(75,75,85,108),
  // Torso
  ln(75,75,75,40),
  jt(75,75),
  // Head
  hd(75,32),
  // Shoulders
  jt(60,44), jt(90,44),
  // Arms on doorframe — forearms vertical on frame
  ln(60,44,38,44,B,2.2), ln(38,44,28,28,B,2.2), // left arm up on frame
  ln(90,44,112,44,B,2.2), ln(112,44,132,28,B,2.2), // right arm up on frame
  // Chest opening — ANIMATED
  c("g",null,
    c("path",{d:"M62 50 Q75 58 88 50",stroke:A,strokeWidth:1.5,fill:"none",opacity:.3,
      children:an("d","M62 50 Q75 58 88 50;M58 48 Q75 62 92 48;M62 50 Q75 58 88 50","3.5s")})),
  // Body lean forward
  c("g",{children:atr("translate","0,0;0,4;0,0","3.5s")},
    c("path",{d:"M70 60 L75 75 L80 60",stroke:A,strokeWidth:1,fill:"none",opacity:.2}))
]);

// 6: Glute Bridge — side view supine, hips rising
case 6: return wrap([fl,
  // Head on floor
  hd(22,102),
  // Upper back/shoulders on floor
  ln(28,100,50,95,B,2.8),
  // Arms flat on floor
  ln(35,100,20,105,B,1.8), ln(45,97,30,100,B,1.8),
  // Torso to hip — ANIMATED (hips rise)
  c("line",{x1:50,y1:95,x2:80,y2:80,stroke:B,strokeWidth:2.8,strokeLinecap:"round",
    children:[an("y2","88;68;88","3s"),an("x2","80;85;80","3s")]}),
  // Hip joint
  c("circle",{cx:80,cy:80,r:2.5,fill:A,children:[an("cy","88;68;88","3s"),an("cx","80;85;80","3s")]}),
  // Thigh — top segment, animated
  c("line",{x1:80,y1:80,x2:100,y2:95,stroke:B,strokeWidth:2.5,strokeLinecap:"round",
    children:[an("y1","88;68;88","3s"),an("x1","80;85;80","3s")]}),
  jt(100,95), // knee
  // Shin
  ln(100,95,90,108),
  // Foot flat
  ln(86,108,94,108,B,2),
  // Squeeze indicator
  c("text",{x:82,y:62,fill:A,fontSize:7,opacity:0,textAnchor:"middle",
    children:c("animate",{attributeName:"opacity",values:"0;.6;0",dur:"3s",repeatCount:"indefinite"})},
    "squeeze!")
]);

// 7: Seated T-Spine Rotation — 3/4 view from above-front
case 7: return wrap([
  // Chair (simple box)
  c("rect",{x:55,y:55,width:50,height:45,rx:4,fill:D,opacity:.2}),
  // Legs (static, front)
  ln(72,85,60,108), ln(88,85,100,108),
  // Hip (static)
  jt(80,85),
  // Lower spine (static)
  ln(80,85,80,65),
  // Upper torso + arms — ANIMATED rotation
  c("g",{style:{transformOrigin:"80px 65px"}},
    // Upper torso
    ln(80,65,80,42,B,2.8),
    // Head
    hd(80,35),
    // Arms crossed on chest
    ln(72,50,88,56,B,2),
    ln(88,50,72,56,B,2),
    // Shoulders
    jt(70,48), jt(90,48),
    atr("rotate","0;-25;0;25;0","4.5s")),
  // Rotation arc
  c("path",{d:"M60 30 A25 25 0 0 1 100 30",stroke:A,strokeWidth:1,fill:"none",opacity:.2,strokeDasharray:"3,3"})
]);

// 8: Open Book — lying on side, arm sweeping arc
case 8: return wrap([fl,
  // Head on floor
  hd(25,95),
  // Torso horizontal
  ln(32,95,72,95,B,2.8),
  // Bottom arm extended forward
  ln(32,95,22,88,B,2),
  // Knees bent — stacked, static
  ln(72,95,90,108), ln(90,108,75,108),
  jt(90,108),
  // Top arm — ANIMATED sweeping arc (the "opening book" motion)
  c("g",{style:{transformOrigin:"50px 93px"}},
    ln(50,93,50,65,A,2.5),
    ln(50,65,45,52,A,2.2),
    c("circle",{cx:45,cy:52,r:2,fill:A}),
    atr("rotate","0;-160;0","5s")),
  // Arc path indicator
  c("path",{d:"M50 60 A35 35 0 0 0 50 108",stroke:A,strokeWidth:.8,fill:"none",opacity:.15,strokeDasharray:"3,4"}),
  // "Stay still" indicator on knees
  c("text",{x:88,y:100,fill:D,fontSize:6,opacity:.4},"✕")
]);

// 9: Shoulder Circles + Neck Stretch — front view standing
case 9: return wrap([fl,
  // Torso
  ln(80,75,80,40,B,2.5),
  jt(80,75),
  // Legs
  ln(80,75,70,108), ln(80,75,90,108),
  // Head — ANIMATED tilt (second phase)
  c("g",null,
    hd(80,30),
    c("animate",{attributeName:"transform",
      values:"translate(0,0);translate(0,0);translate(0,0);translate(-5,3);translate(0,0);translate(5,3);translate(0,0)",
      dur:"6s",repeatCount:"indefinite"})),
  // Shoulder joints — ANIMATED circular motion
  c("g",null,
    c("circle",{cx:66,cy:44,r:3,fill:A,opacity:.7}),
    atr("translate","0,0;0,-6;4,-4;4,2;0,4;-4,2;-4,-4;0,-6;0,0","3s")),
  c("g",null,
    c("circle",{cx:94,cy:44,r:3,fill:A,opacity:.7}),
    atr("translate","0,0;0,-6;-4,-4;-4,2;0,4;4,2;4,-4;0,-6;0,0","3s")),
  // Arms hanging
  ln(66,44,60,70,B,2), ln(94,44,100,70,B,2),
  // Circular motion trail
  c("circle",{cx:66,cy:44,r:7,fill:"none",stroke:A,strokeWidth:.6,opacity:.2}),
  c("circle",{cx:94,cy:44,r:7,fill:"none",stroke:A,strokeWidth:.6,opacity:.2}),
  // Hand on head (neck stretch phase)
  c("g",{opacity:0,children:c("animate",{attributeName:"opacity",values:"0;0;0;.6;0;.6;0",dur:"6s",repeatCount:"indefinite"})},
