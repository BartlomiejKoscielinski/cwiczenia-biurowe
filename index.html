function fmt(s){const m=Math.floor(s/60);return m+":"+(s%60).toString().padStart(2,"0")}
function scCol(s){return s>=4.5?"#22c55e":s>=4.0?"#84cc16":s>=3.5?"#eab308":"#f97316"}

function Timer({total,key:k}){
  const[rem,setRem]=useState(total);
  const[run,setRun]=useState(false);
  const iv=useRef(null);
  useEffect(()=>{setRem(total);setRun(false);iv.current&&clearInterval(iv.current)},[total,k]);
  useEffect(()=>{
    if(run&&rem>0){iv.current=setInterval(()=>setRem(p=>{if(p<=1){clearInterval(iv.current);setRun(false);return 0}return p-1}),1000)}
    return()=>clearInterval(iv.current);
  },[run,rem]);
  const pct=rem/total*100,R=54,C=2*Math.PI*R,off=C-pct/100*C;
  const col=rem<10&&rem>0?"#ef4444":"#6ee7b7";
  return e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:12}},
    e("div",{className:"timer-ring"},
      e("svg",{width:130,height:130,viewBox:"0 0 130 130"},
        e("circle",{cx:65,cy:65,r:R,fill:"none",stroke:"rgba(255,255,255,0.06)",strokeWidth:8}),
        e("circle",{cx:65,cy:65,r:R,fill:"none",stroke:col,strokeWidth:8,strokeLinecap:"round",
          strokeDasharray:C,strokeDashoffset:off,transform:"rotate(-90 65 65)",
          style:{transition:"stroke-dashoffset 0.3s linear, stroke 0.3s ease"}})
      ),
      e("div",{className:"timer-text",style:{color:rem===0?"#22c55e":"#e2e8f0"}},rem===0?"✓":fmt(rem))
    ),
    e("div",{style:{display:"flex",gap:8}},
      e("button",{className:"timer-btn "+(run?"btn-pause":"btn-start"),
        onClick:()=>{if(rem===0)setRem(total);setRun(!run)}},
        run?"⏸ Pauza":rem===0?"▶ Od nowa":"▶ Start"),
      e("button",{className:"timer-btn btn-reset",onClick:()=>{setRem(total);setRun(false);clearInterval(iv.current)}},"↺ Reset")
    )
  );
}

function Card({ex,open,toggle}){
  const cc=ex.cat==="A"?"#38bdf8":"#c084fc";
  const cl=ex.cat==="A"?"MIKRO-PRZERWA":"SESJA PO PRACY";
  return e("div",{className:"card "+(open?"expanded":"collapsed")},
    e("button",{className:"card-header",onClick:toggle},
      e("span",{style:{fontSize:26,lineHeight:1,flexShrink:0}},ex.em),
      e("div",{style:{flex:1,minWidth:0}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}},
          e("span",{className:"badge",style:{color:cc,background:cc+"15"}},cl),
          ex.id>10&&e("span",{className:"badge-new"},"NOWE"),
          e("div",{style:{display:"flex",alignItems:"center",gap:6}},
            e("div",{className:"score-bar"},e("div",{className:"score-fill",style:{width:(ex.sc/5*100)+"%",background:scCol(ex.sc)}})),
            e("span",{style:{fontSize:11,color:scCol(ex.sc),fontWeight:700}},ex.sc.toFixed(1))
          )
        ),
        e("div",{style:{fontSize:15,fontWeight:600,color:"#e2e8f0",lineHeight:1.3}},ex.name),
        e("div",{style:{fontSize:12,color:"#64748b",marginTop:2}},ex.tgt+" · "+ex.time)
      ),
      e("span",{style:{color:"#475569",fontSize:18,transition:"transform 0.3s",transform:open?"rotate(180deg)":"rotate(0)",flexShrink:0}},"▾")
    ),
    open&&e("div",{className:"card-body"},
      e(Timer,{total:ex.ts,key:ex.id}),
      e("div",{style:{marginTop:16}},
        e("div",{className:"section-label",style:{color:"#6ee7b7"}},"Technika wykonania"),
        ex.cues.map((c,i)=>e("div",{className:"cue-step",key:i},e("span",{className:"cue-num"},i+1),e("span",null,c)))
      ),
      e("div",{style:{marginTop:12}},
        e("div",{className:"section-label",style:{color:"#f87171"}},"⚠ Unikaj tych błędów"),
        ex.errs.map((er,i)=>e("div",{className:"error-item",key:i},er))
      ),
      e("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}},
        e("span",{className:"pill"},ex.sets+" serie × "+ex.reps),
        e("span",{className:"pill"},"Przerwa: "+ex.rest+"s"),
        e("a",{href:ex.yt,target:"_blank",rel:"noopener noreferrer",className:"yt-pill"},"▶ YouTube")
      )
    )
  );
}

function Routine({title,ids,icon}){
  const[idx,setIdx]=useState(0);
  const[done,setDone]=useState({});
  const exs=ids.map(id=>EX.find(x=>x.id===id));
  const cur=exs[idx];
  const cnt=Object.keys(done).length;
  const allDone=cnt===exs.length;
  const mark=()=>{const nd={...done,[idx]:true};setDone(nd);if(idx<exs.length-1)setIdx(idx+1)};
  return e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
      e("div",{style:{fontSize:14,fontWeight:700,color:"#e2e8f0"}},icon+" "+title),
      e("div",{style:{fontSize:12,color:"#64748b"}},cnt+"/"+exs.length+" ukończone")
    ),
    e("div",{style:{display:"flex",gap:4,marginBottom:16}},
      exs.map((_,i)=>e("button",{key:i,className:"progress-seg",onClick:()=>setIdx(i),
        style:{background:done[i]?"#22c55e":i===idx?"#6ee7b7":"rgba(255,255,255,0.08)"}}))
    ),
    allDone?
      e("div",{className:"done-banner"},
        e("div",{style:{fontSize:40,marginBottom:8}},"🎉"),
        e("div",{style:{fontSize:18,fontWeight:700,color:"#22c55e",marginBottom:4}},"Gratulacje!"),
        e("div",{style:{fontSize:13,color:"#94a3b8"}},"Wszystkie ćwiczenia ukończone"),
        e("button",{onClick:()=>{setDone({});setIdx(0)},className:"timer-btn btn-start",
          style:{marginTop:16}},"↺ Zacznij od nowa")
      ):
      e("div",{className:"routine-card"},
        e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16}},
          e("span",{style:{fontSize:28}},cur.em),
          e("div",null,
            e("div",{style:{fontSize:16,fontWeight:700,color:"#e2e8f0"}},cur.name),
            e("div",{style:{fontSize:12,color:"#64748b"}},cur.sets+" serie × "+cur.reps)
          )
        ),
        e(Timer,{total:cur.ts,key:"r"+cur.id+idx}),
        e("div",{style:{marginTop:16}},
          cur.cues.map((c,i)=>e("div",{key:i,style:{display:"flex",gap:8,marginBottom:6,fontSize:13,color:"#cbd5e1",lineHeight:1.5}},
            e("span",{style:{color:"#6ee7b7",fontWeight:700,flexShrink:0}},i+1+"."),e("span",null,c)))
        ),
        e("div",{style:{display:"flex",gap:8,marginTop:16}},
          e("button",{className:"btn-done",onClick:mark},"✓ Gotowe — następne"),
          e("a",{href:cur.yt,target:"_blank",rel:"noopener noreferrer",className:"btn-yt"},"▶")
        )
      )
  );
}

function App(){
  const[tab,setTab]=useState("all");
  const[exp,setExp]=useState(null);
  const[flt,setFlt]=useState("all");
  const tabs=[{id:"all",l:"Katalog",ic:"📋"},{id:"micro",l:"Mikro-przerwa",ic:"⚡"},{id:"session",l:"Sesja po pracy",ic:"🧘"}];
  const filtered=flt==="all"?EX:flt==="A"?EX.filter(x=>x.cat==="A"):EX.filter(x=>x.cat==="B");

  return e("div",null,
    e("div",{className:"header"},
      e("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#475569",textTransform:"uppercase",marginBottom:4}},"PROGRAM KOMPENSACYJNY"),
      e("h1",{style:{fontSize:24,fontWeight:700,margin:0,lineHeight:1.2,background:"linear-gradient(135deg,#e2e8f0,#6ee7b7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Ćwiczenia dla pracownika biurowego"),
      e("p",{style:{fontSize:13,color:"#64748b",margin:"6px 0 0",lineHeight:1.5}},"15 ćwiczeń z timerem, instrukcjami i linkami do YouTube. Działa offline.")
    ),
    e("div",{className:"tab-bar"},
      tabs.map(t=>e("button",{key:t.id,className:"tab-btn "+(tab===t.id?"active":""),
        onClick:()=>{setTab(t.id);setExp(null)}},e("span",{style:{fontSize:16}},t.ic),t.l))
    ),
    e("div",{className:"content"},
      tab==="all"&&e("div",null,
        e("div",{style:{display:"flex",gap:6,marginBottom:16}},
          [["all","Wszystkie (15)"],["A","Mikro-przerwy (8)"],["B","Po pracy (7)"]].map(([v,l])=>
            e("button",{key:v,className:"filter-btn "+(flt===v?"active":""),onClick:()=>setFlt(v)},l))
        ),
        filtered.map(ex=>e(Card,{key:ex.id,ex,open:exp===ex.id,toggle:()=>setExp(exp===ex.id?null:ex.id)}))
      ),
      tab==="micro"&&e(Routine,{title:"Mikro-przerwa w pracy",ids:MICRO,icon:"⚡"}),
      tab==="session"&&e(Routine,{title:"Sesja kompensacyjna po pracy",ids:POST,icon:"🧘"})
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js')}
</script>
</body>
</html>
