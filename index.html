<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=JetBrains+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0c0f1a;color:#e2e8f0;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;
  max-width:480px;margin:0 auto;min-height:100dvh;
  background:linear-gradient(180deg,#0c0f1a,#111827 50%,#0f172a);
  overscroll-behavior:none;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer;border:none}
button:active{filter:brightness(1.15);transform:scale(0.97)}
a{text-decoration:none}a:active{filter:brightness(1.2)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
.hdr{padding:24px 20px 0;padding-top:max(24px,env(safe-area-inset-top))}
.tabs{display:flex;gap:3px;padding:12px 20px;position:sticky;top:0;background:linear-gradient(180deg,#0c0f1a 80%,transparent);z-index:10}
.tab{flex:1;padding:8px 4px;border-radius:10px;font-weight:600;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s}
.tab.on{background:rgba(110,231,183,.12);color:#6ee7b7}.tab:not(.on){background:rgba(255,255,255,.03);color:#64748b}
.cnt{padding:0 20px 32px}
.crd{border-radius:16px;overflow:hidden;transition:.3s;margin-bottom:8px}
.crd.off{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.crd.on{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.ch{width:100%;padding:16px 20px;background:0;text-align:left;display:flex;align-items:center;gap:14px}
.bdg{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.new{font-size:9px;font-weight:800;letter-spacing:1px;color:#fbbf24;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px}
.sb{width:48px;height:6px;border-radius:3px;background:rgba(255,255,255,.08)}.sf{height:100%;border-radius:3px;transition:.5s}
.cb{padding:0 20px 20px;animation:fadeIn .3s}
.cs{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:#cbd5e1;line-height:1.5}
.cn{width:20px;height:20px;border-radius:6px;flex-shrink:0;background:rgba(110,231,183,.1);color:#6ee7b7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.ei{font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.5;padding-left:12px;border-left:2px solid rgba(248,113,113,.2)}
.pl{font-size:12px;color:#64748b;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:6px;display:inline-block}
.yl{font-size:12px;color:#f87171;background:rgba(248,113,113,.08);padding:4px 10px;border-radius:6px;font-weight:600;display:inline-block}
.tr{position:relative;width:130px;height:130px}
.tt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:2px}
.tb{padding:8px 20px;border-radius:8px;font-weight:600;font-size:13px;transition:.2s}
.ts{background:rgba(110,231,183,.15);color:#6ee7b7}.tp{background:rgba(239,68,68,.15);color:#fca5a5}
.tre{background:rgba(255,255,255,.06);color:#94a3b8;padding:8px 14px}
.rc{background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px}
.bd{flex:1;padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(110,231,183,.15));color:#6ee7b7;transition:.2s}
.by{padding:12px 16px;border-radius:10px;background:rgba(248,113,113,.08);color:#f87171;font-weight:600;font-size:14px;display:flex;align-items:center}
.ps{flex:1;height:6px;border-radius:3px;border:none;cursor:pointer;transition:.3s}
.fb{padding:6px 12px;border-radius:6px;font-weight:600;font-size:12px}
.fb.on{background:rgba(255,255,255,.08);color:#e2e8f0}.fb:not(.on){background:0;color:#475569}
.sl{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.dn{text-align:center;padding:32px;background:rgba(34,197,94,.06);border-radius:16px}
.sx{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;text-align:center;flex:1}
.nc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:12px}
.svg-wrap{display:flex;justify-content:center;margin:14px 0 10px;padding:12px;background:rgba(0,0,0,.2);border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.svg-wrap svg{filter:drop-shadow(0 0 10px rgba(110,231,183,.12));max-width:100%}

</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
"use strict";
const h=React.createElement,{useState,useEffect,useRef}=React;

// ── Storage ──
const S={g(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
const today=()=>new Date().toISOString().slice(0,10);

// ── Audio ──
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach(t=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(.3,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+t+.12);o.start(a.currentTime+t);o.stop(a.currentTime+t+.12)});if(navigator.vibrate)navigator.vibrate([100,50,100,50,100])}catch(e){}}

// ── Smart Notifications (quiet hours aware) ──
let _niv=null;
const nPerm=()=>typeof Notification!=='undefined'?Notification.permission:'unavailable';
const nReq=cb=>{if(typeof Notification==='undefined')return cb('unavailable');Notification.requestPermission().then(cb)};

function inQuiet(cfg){
  const now=new Date(),h=now.getHours();
  const qs=cfg.qs||21, qe=cfg.qe||9;
  if(qs>qe) return h>=qs||h<qe; // e.g. 21-9: quiet from 21:00 to 08:59
  return h>=qs&&h<qe;
}

function tryNotify(cfg){
  if(nPerm()!=='granted')return;
  if(inQuiet(cfg))return; // silent during quiet hours
const msgs=[
  {t:'⚡ Czas na mikro-przerwę!',b:'Wstań i rozciągnij się — 2 minuty dla kręgosłupa.'},
  {t:'🔄 Przerwa od ekranu!',b:'Chin tuck + rotacja piersiowa — Twoja szyja Ci podziękuje.'},
  {t:'💆 Rozruszaj barki!',b:'Wall Angel lub Doorway Stretch — otwórz klatkę piersiową.'},
  {t:'🤲 Zadbaj o nadgarstki!',b:'Nerve flossing nerwu pośrodkowego — profilaktyka cieśni.'},
  {t:'🎯 Mikro-przerwa!',b:'2 minuty ruchu = 2 godziny lepszego skupienia.'},
];
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  new Notification(m.t,{body:m.b,icon:'icon-192.png',tag:'mb',silent:false});
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}

function startN(cfg){
  stopN();
  if(nPerm()!=='granted')return;
  // Check immediately, then repeat
  tryNotify(cfg);
  _niv=setInterval(()=>tryNotify(cfg),(cfg.mins||90)*60*1000);
  S.s('ncfg',cfg);S.s('non',true);
}
function stopN(){if(_niv){clearInterval(_niv);_niv=null}S.s('non',false)}

// ── Tracker ──
function logDone(type){const d=S.g('tr',{});const k=today();if(!d[k])d[k]={m:0,s:0};d[k][type==='micro'?'m':'s']++;S.s('tr',d)}
function streak(){const d=S.g('tr',{});let s=0;const n=new Date();n.setHours(0,0,0,0);for(let i=0;i<365;i++){const dt=new Date(n);dt.setDate(dt.getDate()-i);if(d[dt.toISOString().slice(0,10)])s++;else break}return s}
function mData(y,m){const d=S.g('tr',{});const r=[];const f=new Date(y,m,1);const l=new Date(y,m+1,0);for(let i=1;i<=l.getDate();i++){const k=y+"-"+String(m+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");const v=d[k]||{m:0,s:0};r.push({day:i,k,mc:v.m,sc:v.s,t:v.m+v.s})}return{days:r,fd:(f.getDay()+6)%7}}

// ── SVG Illustrations ──
// Each returns an animated SVG showing the exercise position
// Body color scheme: #6ee7b7 (limbs), #4ade80 (accent/active), #334155 (floor/wall)
// All viewBox 0 0 120 100, rendered at 120x100

function svgEl(id){
const B="#6ee7b7",A="#4ade80",D="#334155",BF="rgba(110,231,183,0.1)";
const c=(...a)=>h(...a);
const vb="0 0 160 120";

// --- Eased SMIL animations: spline interpolation replaces all linear motion ---
const eas=(a,v,d,k)=>{const n=v.split(";").length-1;
  return c("animate",{attributeName:a,values:v,dur:d,repeatCount:"indefinite",
    calcMode:"spline",keySplines:k||Array(n).fill("0.42 0 0.58 1").join(";")})};
// Eased rotate around (cx,cy)
const easR=(v,d,cx,cy,k)=>{const f=v.split(";"),n=f.length-1;
  return c("animateTransform",{attributeName:"transform",type:"rotate",
    values:f.map(a=>a+" "+cx+" "+cy).join(";"),dur:d,repeatCount:"indefinite",
    calcMode:"spline",keySplines:k||Array(n).fill("0.42 0 0.58 1").join(";")})};
// Eased translate
const easTl=(v,d,k)=>{const n=v.split(";").length-1;
  return c("animateTransform",{attributeName:"transform",type:"translate",
    values:v,dur:d,repeatCount:"indefinite",
    calcMode:"spline",keySplines:k||Array(n).fill("0.42 0 0.58 1").join(";")})};
const BR="0.25 0.1 0.25 1"; // breathe easing curve

// --- Body part helpers: filled silhouettes, not wireframes ---
const hd=(x,y,r)=>c("circle",{cx:x,cy:y,r:r||5.5,fill:B});
const jt=(x,y,r)=>c("circle",{cx:x,cy:y,r:r||2.5,fill:B,opacity:.7});
// Torso ellipse: rx≈6 side view, rx≈12 front view
const ts=(cx,cy,rx,ry,ang)=>c("ellipse",{cx,cy,rx,ry,fill:BF,stroke:B,strokeWidth:1.2,
  ...(ang!=null?{transform:"rotate("+ang+","+cx+","+cy+")"}:{})});
// Curved limb path (thick rounded strokes for body mass)
const lm=(d,col,w)=>c("path",{d,stroke:col||B,strokeWidth:w||4.5,
  strokeLinecap:"round",strokeLinejoin:"round",fill:"none"});
// Filled anatomical body segment (closed path with muscle contours)
const bp=(d,fill,sw)=>c("path",{d,fill:fill||BF,stroke:B,strokeWidth:sw||1,strokeLinejoin:"round"});
// Muscle highlight glow ellipse
const gl=(cx,cy,rx,ry,ang)=>c("ellipse",{cx,cy,rx:rx||8,ry:ry||5,
  fill:A,opacity:.12,stroke:"none",
  ...(ang!=null?{transform:"rotate("+ang+","+cx+","+cy+")"}:{})});
const fl=c("line",{x1:8,y1:110,x2:152,y2:110,stroke:D,strokeWidth:1,opacity:.3,strokeDasharray:"6,4"});
const wrap=ch=>c("svg",{viewBox:vb,width:160,height:120,xmlns:"http://www.w3.org/2000/svg"},ch);
// Shared SVG defs: glow filter + body gradient
const svgDefs=c("defs",null,
  c("filter",{id:"gloF",x:"-50%",y:"-50%",width:"200%",height:"200%"},
    c("feGaussianBlur",{stdDeviation:3,result:"b"}),
    c("feMerge",null,c("feMergeNode",{in:"b"}),c("feMergeNode",{in:"SourceGraphic"}))),
  c("linearGradient",{id:"bg",x1:"0",y1:"0",x2:"0",y2:"1"},
    c("stop",{offset:"0%",stopColor:B,stopOpacity:.15}),
    c("stop",{offset:"100%",stopColor:B,stopOpacity:.06})));

switch(id){

// 1: World's Greatest Stretch — deep lunge athletic silhouette + T-spine rotation
// Side view: composite filled body paths with deltoid, ribcage taper, quad/hamstring contours
// Animation: arm sweeps via easR around shoulder for thoracic opening
case 1: return wrap([svgDefs, fl,
  // MUSCLE GLOW — T-spine region (filtered), hip flexor
  c("ellipse",{cx:70,cy:52,rx:10,ry:7,fill:A,opacity:.18,filter:"url(#gloF)",
    transform:"rotate(-28,70,52)"}),
  gl(94,72,6,4,-10),
  // TORSO: shoulder(62,42)→hip(80,66) — deltoid cap, ribcage taper, oblique, hip
  bp("M57 44 C62 49 67 56 72 61 C76 64 79 66 80 67 "+
     "L83 65 C80 63 76 58 71 53 C66 47 63 43 62 40 Z","url(#bg)"),
  // FRONT THIGH: hip→knee(52,86) — quad sweep anterior, hamstring posterior
  bp("M79 65 C72 70 63 78 51 84 "+
     "L51 88 C63 82 72 74 81 68 Z"),
  // FRONT SHIN+CALF: knee→ankle(50,106) — calf bulge on posterior
  bp("M49 84 C49 90 49 98 49 106 "+
     "L53 106 C54 98 55 92 53 86 Z"),
  // FRONT FOOT
  bp("M46 108 L56 108 L52 105 Z"),
  // BACK THIGH: hip→knee(118,92) — extended hamstring
  bp("M80 64 C90 70 102 78 116 89 "+
     "L120 94 C106 83 92 74 82 68 Z"),
  // BACK SHIN+CALF: knee→ankle(132,106)
  bp("M116 90 C120 95 126 100 131 106 "+
     "L135 106 C130 100 124 96 120 92 Z"),
  // BACK FOOT
  bp("M129 108 L139 108 L135 105 Z"),
  // JOINTS
  jt(52,86,3), jt(118,92,2.5), jt(80,66,3),
  // HEAD + NECK
  hd(56,34), lm("M58 38 L62 42",B,3),
  // GROUND ARM: shoulder→floor (stroked, thinner appendage)
  lm("M62 42 Q56 56 48 72 Q46 84 44 96",B,3.5),
  c("circle",{cx:44,cy:96,r:2,fill:B,opacity:.6}),
  // ROTATING ARM: T-spine rotation — spline-eased sweep
  c("g",null,
    lm("M62 42 Q69 34 76 26",A,4),
    c("circle",{cx:76,cy:26,r:2.5,fill:A}),
    easR("-30;60;-30","3.5s",62,42)),
  // ROTATION ARC indicator
  c("path",{d:"M68 28 A20 20 0 0 1 88 46",stroke:A,strokeWidth:.8,fill:"none",opacity:.2,strokeDasharray:"3,3"})
]);

// 2: Cat-Cow — spine path morphs cow↓ / cat↑ with breathe easing
case 2: return wrap([fl,
  lm("M38 82 L38 108",B,4), lm("M118 82 L118 108",B,4),
  c("path",{d:"M38 82 C58 68 98 68 118 82",stroke:B,strokeWidth:5,strokeLinecap:"round",fill:"none",
    children:eas("d","M38 82 C58 68 98 68 118 82;M38 82 C58 94 98 94 118 82;M38 82 C58 68 98 68 118 82","4s",BR+";"+BR)}),
  c("path",{d:"M38 82 C58 68 98 68 118 82 C98 74 58 74 38 82",fill:BF,stroke:"none",
    children:eas("d","M38 82 C58 68 98 68 118 82 C98 74 58 74 38 82;M38 82 C58 94 98 94 118 82 C98 88 58 88 38 82;M38 82 C58 68 98 68 118 82 C98 74 58 74 38 82","4s",BR+";"+BR)}),
  c("path",{d:"M48 76 C58 64 98 64 108 76",fill:"none",stroke:A,strokeWidth:8,opacity:.08,strokeLinecap:"round",
    children:eas("d","M48 76 C58 64 98 64 108 76;M48 76 C58 90 98 90 108 76;M48 76 C58 64 98 64 108 76","4s",BR+";"+BR)}),
  c("g",null, hd(30,72), easTl("0,0;0,12;0,0","4s",BR+";"+BR)),
  c("text",{x:78,y:16,fill:A,fontSize:9,textAnchor:"middle",opacity:0,
    children:eas("opacity",".6;0;.6","4s")},"cow \u2193"),
  c("text",{x:78,y:16,fill:A,fontSize:9,textAnchor:"middle",opacity:0,
    children:eas("opacity","0;.6;0","4s")},"cat \u2191")
]);

// 3: Chin Tuck — seated silhouette, head retracts with ghost of wrong position
case 3: return wrap([
  c("rect",{x:72,y:50,width:32,height:48,rx:4,fill:D,opacity:.18}),
  c("rect",{x:98,y:30,width:7,height:68,rx:3,fill:D,opacity:.18}),
  gl(76,42,4,6),
  ts(82,64,6,16),
  lm("M82 82 Q76 86 70 92",B,4.5), lm("M70 92 L68 108",B,4), jt(70,92),
  lm("M82 82 Q84 88 86 92",B,4.5), lm("M86 92 L88 108",B,4), jt(86,92),
  lm("M82 56 Q76 65 72 76",B,3.5),
  lm("M82 48 L82 42",B,3),
  c("g",null, hd(82,34), lm("M77 36 L75 37",A,1.5),
    easTl("0,0;-10,0;0,0","2.8s")),
  c("circle",{cx:88,cy:34,r:5.5,fill:"none",stroke:B,strokeWidth:1,opacity:.12,strokeDasharray:"3,3"}),
  c("path",{d:"M70 28 L62 28",stroke:A,strokeWidth:1.5,fill:"none",opacity:.3,
    children:eas("opacity",".2;.6;.2","2.8s")})
]);

// 4: Hip Flexor Stretch — half-kneeling with breathing torso + arm overhead
case 4: return wrap([fl,
  gl(98,72,7,5,-10),
  c("ellipse",{cx:88,cy:56,rx:6,ry:14,fill:BF,stroke:B,strokeWidth:1.2,
    transform:"rotate(-5,88,56)",children:eas("rx","6;6.4;6","3.5s",BR+";"+BR)}),
  lm("M90 70 Q100 82 108 95"), lm("M108 95 L120 108",B,4), jt(108,95),
  c("circle",{cx:108,cy:108,r:3,fill:D,opacity:.2}),
  lm("M90 70 Q76 80 62 90"), lm("M62 90 L62 108",B,4), jt(62,90),
  hd(86,30), lm("M87 35 L88 42",B,3),
  lm("M88 48 Q78 58 68 68",B,3.5),
  c("g",null, lm("M88 48 Q92 38 90 22 Q89 15 86 10",A,3.5),
    c("circle",{cx:86,cy:10,r:2,fill:A}), eas("opacity",".5;1;.5","3.5s")),
  c("path",{d:"M96 74 Q94 78 90 76",stroke:A,strokeWidth:1.5,fill:"none",opacity:.4})
]);

// 5: Doorway Pec Stretch — front view, chest opens as shoulders spread
case 5: return wrap([fl,
  lm("M28 8 L28 110",D,3), lm("M132 8 L132 110",D,3),
  c("line",{x1:28,y1:8,x2:132,y2:8,stroke:D,strokeWidth:3}),
  gl(68,52,8,5), gl(92,52,8,5),
  c("ellipse",{cx:80,cy:56,rx:12,ry:16,fill:BF,stroke:B,strokeWidth:1.2,
    children:eas("cy","56;60;56","3.5s")}),
  c("circle",{cx:80,cy:30,r:5.5,fill:B,children:eas("cy","30;33;30","3.5s")}),
  lm("M80 35 L80 40",B,3),
  lm("M80 72 Q74 90 68 108",B,4.5), lm("M80 72 Q86 90 92 108",B,4.5),
  c("circle",{cx:64,cy:44,r:3,fill:B,children:eas("cx","64;60;64","3.5s")}),
  lm("M64 44 Q46 44 32 44",B,3.5), lm("M32 44 Q30 34 30 24",B,3.5),
  c("circle",{cx:96,cy:44,r:3,fill:B,children:eas("cx","96;100;96","3.5s")}),
  lm("M96 44 Q114 44 128 44",B,3.5), lm("M128 44 Q130 34 130 24",B,3.5),
  c("path",{d:"M64 52 Q80 60 96 52",stroke:A,strokeWidth:1.5,fill:"none",opacity:.3,
    children:eas("d","M64 52 Q80 60 96 52;M60 50 Q80 66 100 50;M64 52 Q80 60 96 52","3.5s")})
]);

// 6: Glute Bridge — supine silhouette, hips rise via smooth path morphing
case 6: return wrap([fl,
  c("ellipse",{cx:72,cy:88,rx:8,ry:5,fill:A,opacity:.12,
    children:[eas("cy","88;68;88","3s"),eas("cx","72;78;72","3s")]}),
  hd(22,102),
  lm("M28 100 Q36 98 46 96",B,5),
  lm("M36 100 L22 104",B,3), lm("M42 98 L30 102",B,3),
  c("path",{d:"M46 96 Q58 92 72 88",stroke:B,strokeWidth:5,strokeLinecap:"round",fill:"none",
    children:eas("d","M46 96 Q58 92 72 88;M46 96 Q58 82 78 68;M46 96 Q58 92 72 88","3s")}),
  c("path",{d:"M46 96 Q58 92 72 88 Q58 95 46 96",fill:BF,stroke:"none",
    children:eas("d","M46 96 Q58 92 72 88 Q58 95 46 96;M46 96 Q58 82 78 68 Q58 86 46 96;M46 96 Q58 92 72 88 Q58 95 46 96","3s")}),
  c("circle",{cx:72,cy:88,r:3,fill:A,children:[eas("cy","88;68;88","3s"),eas("cx","72;78;72","3s")]}),
  c("path",{d:"M72 88 Q86 90 100 92",stroke:B,strokeWidth:4.5,strokeLinecap:"round",fill:"none",
    children:eas("d","M72 88 Q86 90 100 92;M78 68 Q90 80 100 92;M72 88 Q86 90 100 92","3s")}),
  jt(100,92),
  lm("M100 92 Q96 100 92 108",B,4),

    h("div",{className:"hdr"},h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("div",null,h("div",{style:{fontSize:11,fontWeight:700,letterSpacing:2,color:"#475569",textTransform:"uppercase",marginBottom:4}},"PROGRAM KOMPENSACYJNY"),
        h("h1",{style:{fontSize:22,fontWeight:700,margin:0,lineHeight:1.2,background:"linear-gradient(135deg,#e2e8f0,#6ee7b7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Ćwiczenia biurowe")),
      streak()>0&&h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:24,fontWeight:700,color:"#6ee7b7",fontFamily:"'JetBrains Mono',monospace"}},streak()),
        h("div",{style:{fontSize:9,color:"#475569",letterSpacing:1}},"STREAK")))),
    h("div",{className:"tabs"},tabs.map(t=>h("button",{key:t.id,className:"tab "+(tab===t.id?"on":""),onClick:()=>{setTab(t.id);setExp(null);setR(r=>r+1)}},h("span",{style:{fontSize:14}},t.ic),t.l))),
    h("div",{className:"cnt"},
      tab==="all"&&h("div",null,
        h("div",{style:{display:"flex",gap:6,marginBottom:16}},
          [["all","Wszystkie"],["A","Mikro (8)"],["B","Po pracy (7)"]].map(([v,l])=>h("button",{key:v,className:"fb "+(flt===v?"on":""),onClick:()=>setFlt(v)},l))),
        filtered.map(x=>h(Card,{key:x.id,ex:x,open:exp===x.id,toggle:()=>setExp(exp===x.id?null:x.id)}))),
      tab==="micro"&&h(Routine,{title:"Mikro-przerwa",ids:MICRO,icon:"⚡",type:"micro",key:"m"+_}),
      tab==="session"&&h(Routine,{title:"Sesja po pracy",ids:POST,icon:"🧘",type:"session",key:"s"+_}),
      tab==="tracker"&&h(Heatmap,{key:"t"+_}),
      tab==="settings"&&h(Settings,{key:"n"+_})))
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App));
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
