<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<title>Ćwiczenia Biurowe</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=JetBrains+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0c0f1a;color:#e2e8f0;font-family:'DM Sans','Segoe UI',system-ui,sans-serif;
  max-width:480px;margin:0 auto;min-height:100dvh;
  background:linear-gradient(180deg,#0c0f1a,#111827 50%,#0f172a);
  overscroll-behavior:none;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer;border:none}
button:active{filter:brightness(1.15);transform:scale(0.97)}
a{text-decoration:none}a:active{filter:brightness(1.2)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}
.hdr{padding:24px 20px 0;padding-top:max(24px,env(safe-area-inset-top))}
.tabs{display:flex;gap:3px;padding:12px 20px;position:sticky;top:0;background:linear-gradient(180deg,#0c0f1a 80%,transparent);z-index:10}
.tab{flex:1;padding:8px 4px;border-radius:10px;font-weight:600;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.2s}
.tab.on{background:rgba(110,231,183,.12);color:#6ee7b7}.tab:not(.on){background:rgba(255,255,255,.03);color:#64748b}
.cnt{padding:0 20px 32px}
.crd{border-radius:16px;overflow:hidden;transition:.3s;margin-bottom:8px}
.crd.off{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.crd.on{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.ch{width:100%;padding:16px 20px;background:0;text-align:left;display:flex;align-items:center;gap:14px}
.bdg{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.new{font-size:9px;font-weight:800;letter-spacing:1px;color:#fbbf24;background:rgba(251,191,36,.12);padding:2px 6px;border-radius:4px}
.sb{width:48px;height:6px;border-radius:3px;background:rgba(255,255,255,.08)}.sf{height:100%;border-radius:3px;transition:.5s}
.cb{padding:0 20px 20px;animation:fadeIn .3s}
.cs{display:flex;gap:10px;margin-bottom:8px;font-size:13px;color:#cbd5e1;line-height:1.5}
.cn{width:20px;height:20px;border-radius:6px;flex-shrink:0;background:rgba(110,231,183,.1);color:#6ee7b7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.ei{font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.5;padding-left:12px;border-left:2px solid rgba(248,113,113,.2)}
.pl{font-size:12px;color:#64748b;background:rgba(255,255,255,.04);padding:4px 10px;border-radius:6px;display:inline-block}
.yl{font-size:12px;color:#f87171;background:rgba(248,113,113,.08);padding:4px 10px;border-radius:6px;font-weight:600;display:inline-block}
.tr{position:relative;width:130px;height:130px}
.tt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:2px}
.tb{padding:8px 20px;border-radius:8px;font-weight:600;font-size:13px;transition:.2s}
.ts{background:rgba(110,231,183,.15);color:#6ee7b7}.tp{background:rgba(239,68,68,.15);color:#fca5a5}
.tre{background:rgba(255,255,255,.06);color:#94a3b8;padding:8px 14px}
.rc{background:rgba(255,255,255,.03);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px}
.bd{flex:1;padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(110,231,183,.15));color:#6ee7b7;transition:.2s}
.by{padding:12px 16px;border-radius:10px;background:rgba(248,113,113,.08);color:#f87171;font-weight:600;font-size:14px;display:flex;align-items:center}
.ps{flex:1;height:6px;border-radius:3px;border:none;cursor:pointer;transition:.3s}
.fb{padding:6px 12px;border-radius:6px;font-weight:600;font-size:12px}
.fb.on{background:rgba(255,255,255,.08);color:#e2e8f0}.fb:not(.on){background:0;color:#475569}
.sl{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.dn{text-align:center;padding:32px;background:rgba(34,197,94,.06);border-radius:16px}
.sx{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;text-align:center;flex:1}
.nc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:12px}
.svg-wrap{display:flex;justify-content:center;margin:12px 0 8px}
.svg-wrap svg{filter:drop-shadow(0 0 8px rgba(110,231,183,.15))}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
"use strict";
const h=React.createElement,{useState,useEffect,useRef}=React;

// ── Storage ──
const S={g(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}},s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}};
const today=()=>new Date().toISOString().slice(0,10);

// ── Audio ──
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach(t=>{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(.3,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.01,a.currentTime+t+.12);o.start(a.currentTime+t);o.stop(a.currentTime+t+.12)});if(navigator.vibrate)navigator.vibrate([100,50,100,50,100])}catch(e){}}

// ── Smart Notifications (quiet hours aware) ──
let _niv=null;
const nPerm=()=>typeof Notification!=='undefined'?Notification.permission:'unavailable';
const nReq=cb=>{if(typeof Notification==='undefined')return cb('unavailable');Notification.requestPermission().then(cb)};

function inQuiet(cfg){
  const now=new Date(),h=now.getHours();
  const qs=cfg.qs||21, qe=cfg.qe||9;
  if(qs>qe) return h>=qs||h<qe; // e.g. 21-9: quiet from 21:00 to 08:59
  return h>=qs&&h<qe;
}

function tryNotify(cfg){
  if(nPerm()!=='granted')return;
  if(inQuiet(cfg))return; // silent during quiet hours
  const msgs=[
    {t:'⚡ Czas na mikro-przerwę!',b:'Wstań i rozciągnij się — 2 minuty dla kręgosłupa.'},
    {t:'🔄 Przerwa od ekranu!',b:'Chin tuck + rotacja piersiowa — Twoja szyja Ci podziękuje.'},
    {t:'💆 Rozruszaj barki!',b:'Wall Angel lub Doorway Stretch — otwórz klatkę piersiową.'},
    {t:'🤲 Zadbaj o nadgarstki!',b:'Nerve flossing nerwu pośrodkowego — profilaktyka cieśni.'},
    {t:'🎯 Mikro-przerwa!',b:'2 minuty ruchu = 2 godziny lepszego skupienia.'}
  ];
  const m=msgs[Math.floor(Math.random()*msgs.length)];
  new Notification(m.t,{body:m.b,icon:'icon-192.png',tag:'mb',silent:false});
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}

function startN(cfg){
  stopN();
  if(nPerm()!=='granted')return;
  // Check immediately, then repeat
  tryNotify(cfg);
  _niv=setInterval(()=>tryNotify(cfg),(cfg.mins||90)*60*1000);
  S.s('ncfg',cfg);S.s('non',true);
}
function stopN(){if(_niv){clearInterval(_niv);_niv=null}S.s('non',false)}

// ── Tracker ──
function logDone(type){const d=S.g('tr',{});const k=today();if(!d[k])d[k]={m:0,s:0};d[k][type==='micro'?'m':'s']++;S.s('tr',d)}
function streak(){const d=S.g('tr',{});let s=0;const n=new Date();n.setHours(0,0,0,0);for(let i=0;i<365;i++){const dt=new Date(n);dt.setDate(dt.getDate()-i);if(d[dt.toISOString().slice(0,10)])s++;else break}return s}
function mData(y,m){const d=S.g('tr',{});const r=[];const f=new Date(y,m,1);const l=new Date(y,m+1,0);for(let i=1;i<=l.getDate();i++){const k=y+"-"+String(m+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");const v=d[k]||{m:0,s:0};r.push({day:i,k,mc:v.m,sc:v.s,t:v.m+v.s})}return{days:r,fd:(f.getDay()+6)%7}}

// ── SVG Illustrations ──
// Each returns an animated SVG showing the exercise position
// Body color scheme: #6ee7b7 (limbs), #4ade80 (accent/active), #334155 (floor/wall)
// All viewBox 0 0 120 100, rendered at 120x100

function svgEl(id){
const L="#6ee7b7",A="#4ade80",D="#334155",W=2.2;
const c=(tag,props,...ch)=>h(tag,props,...ch);
const ln=(x1,y1,x2,y2,col,w)=>c("line",{x1,y1,x2,y2,stroke:col||L,strokeWidth:w||W,strokeLinecap:"round"});
const ci=(cx,cy,r,col)=>c("circle",{cx,cy,r,fill:col||L});
const ani=(attr,from,to,dur)=>c("animate",{attributeName:attr,values:from+";"+to+";"+from,dur:dur||"3s",repeatCount:"indefinite"});
const aniT=(attr,from,to,dur)=>c("animateTransform",{attributeName:"transform",type:attr,values:from+";"+to+";"+from,dur:dur||"3s",repeatCount:"indefinite"});

const floor=c("line",{x1:5,y1:92,x2:115,y2:92,stroke:D,strokeWidth:1,strokeDasharray:"4,3"});
const wall=c("line",{x1:95,y1:15,x2:95,y2:92,stroke:D,strokeWidth:1.5});

switch(id){
// 1: World's Greatest Stretch — deep lunge + rotation
case 1: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(55,32,5),// head
  ln(55,37,55,58),// torso (angled)
  ln(55,58,35,85),// front leg bent
  ln(35,85,35,92),// front shin
  ln(55,58,80,80),// back leg
  ln(80,80,95,92),// back shin
  ln(55,45,35,60),// left arm down
  c("g",null,ln(55,45,70,25),// right arm up rotating
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 55 45;15 55 45;0 55 45",dur:"3s",repeatCount:"indefinite"})),
  c("path",{d:"M68 23 L72 20 L74 26",stroke:A,strokeWidth:1.5,fill:"none",children:
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 55 45;15 55 45;0 55 45",dur:"3s",repeatCount:"indefinite"})})
);
// 2: Cat-Cow — tabletop alternating arch/round
case 2: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(30,48,4.5),// head
  c("path",{d:"M34 52 Q60 42 86 52",stroke:L,strokeWidth:W,fill:"none",children:[
    c("animate",{attributeName:"d",values:"M34 52 Q60 42 86 52;M34 52 Q60 62 86 52;M34 52 Q60 42 86 52",dur:"4s",repeatCount:"indefinite"})
  ]}),// spine arching
  ln(34,52,30,75),ln(30,75,30,92),// front legs
  ln(86,52,86,75),ln(86,75,86,92),// back legs
  c("circle",{cx:30,cy:48,r:4.5,fill:L,children:c("animate",{attributeName:"cy",values:"48;55;48",dur:"4s",repeatCount:"indefinite"})})
);
// 3: Chin Tuck — seated, head retracting
case 3: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},
  c("rect",{x:55,y:40,width:30,height:50,rx:3,fill:D,opacity:.3}),// chair
  ci(60,28,5),// head
  c("animateTransform",{attributeName:"transform",type:"translate",values:"0,0;-6,0;0,0",dur:"2.5s",repeatCount:"indefinite",href:"#ct3h"}),
  c("g",{id:"ct3h"},ci(60,28,5),ln(60,22,60,18)),// head+neck
  ln(60,33,60,65),// torso
  ln(60,65,45,92),ln(60,65,75,92),// legs on chair
  ln(60,45,45,55),ln(60,45,75,55),// arms on lap
  c("g",null,
    c("line",{x1:60,y1:28,x2:54,y2:28,stroke:A,strokeWidth:1.5,strokeDasharray:"2,2",opacity:.5}),
    c("animate",{attributeName:"opacity",values:".5;1;.5",dur:"2.5s",repeatCount:"indefinite"}))
);
// 4: Hip Flexor Stretch — kneeling lunge
case 4: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(60,25,5),// head
  ln(60,30,60,55),// torso upright
  ln(60,55,40,75),ln(40,75,40,92),// front leg 90°
  ln(60,55,75,75),ln(75,75,85,92),// back leg kneeling
  c("g",null,ln(60,40,60,15),// arm overhead
    c("animate",{attributeName:"x2",values:"60;55;60",dur:"3s",repeatCount:"indefinite"})),
  c("path",{d:"M55 55 L60 55 L60 60",stroke:A,strokeWidth:1,fill:"none",opacity:.6}),// pelvic tilt arrow
  c("text",{x:48,y:63,fill:A,fontSize:6,opacity:.5},"←tilt")
);
// 5: Doorway Pec Stretch — standing in doorframe
case 5: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ln(30,10,30,92,D,1.5),ln(90,10,90,92,D,1.5),// door frame
  ci(60,28,5),// head
  ln(60,33,60,65),// torso
  ln(60,65,50,92),ln(60,65,70,92),// legs
  ln(60,42,30,35),ln(60,42,90,35),// arms on frame
  c("g",null,// chest opening
    c("animate",{attributeName:"opacity",values:".3;.8;.3",dur:"3s",repeatCount:"indefinite"}),
    c("path",{d:"M50 38 Q60 45 70 38",stroke:A,strokeWidth:1.5,fill:"none"}))
);
// 6: Glute Bridge — supine bridge
case 6: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(20,82,4.5),// head
  c("line",{x1:24,y1:80,x2:55,y2:65,stroke:L,strokeWidth:W,strokeLinecap:"round",children:
    c("animate",{attributeName:"y2",values:"72;60;72",dur:"3s",repeatCount:"indefinite"})}),// torso rising
  ln(55,72,70,92),// thigh
  ln(70,92,55,92),// shin (foot flat)
  ln(24,80,15,85),ln(24,80,15,75),// arms flat
  c("circle",{cx:55,cy:65,r:3,fill:A,opacity:.4,children:c("animate",{attributeName:"cy",values:"72;60;72",dur:"3s",repeatCount:"indefinite"})})
);
// 7: Seated T-Spine Rotation
case 7: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},
  c("rect",{x:45,y:45,width:30,height:45,rx:3,fill:D,opacity:.3}),// chair
  ci(60,25,5),// head
  ln(60,30,60,60),// torso
  ln(60,60,48,92),ln(60,60,72,92),// legs
  c("g",null,// rotating arms
    ln(60,42,40,38),ln(60,42,80,38),
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 60 42;20 60 42;0 60 42;-20 60 42;0 60 42",dur:"4s",repeatCount:"indefinite"})),
  c("path",{d:"M50 20 A15 15 0 0 1 70 20",stroke:A,strokeWidth:1,fill:"none",opacity:.4,children:
    c("animate",{attributeName:"opacity",values:".2;.7;.2",dur:"4s",repeatCount:"indefinite"})})
);
// 8: Open Book — sidelying rotation
case 8: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(25,78,4.5),// head
  ln(29,80,55,80),// torso horizontal
  ln(55,80,70,92),ln(70,92,55,92),// legs folded
  ln(29,80,25,88),// bottom arm
  c("g",null,// top arm rotating like opening a book
    c("line",{x1:40,y1:78,x2:40,y2:50,stroke:A,strokeWidth:W,strokeLinecap:"round"}),
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 40 78;-70 40 78;0 40 78",dur:"4s",repeatCount:"indefinite"})),
  c("path",{d:"M35 75 A8 8 0 0 0 45 75",stroke:A,strokeWidth:1,fill:"none",opacity:.3})
);
// 9: Shoulder Circles + Neck Stretch
case 9: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},
  ci(60,28,5),// head
  ln(60,33,60,65),// torso
  ln(60,65,50,92),ln(60,65,70,92),// legs
  c("g",null,// shoulders circling
    c("circle",{cx:48,cy:40,r:3,fill:A,opacity:.6}),
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 48 40;360 48 40",dur:"2s",repeatCount:"indefinite"})),
  c("g",null,
    c("circle",{cx:72,cy:40,r:3,fill:A,opacity:.6}),
    c("animateTransform",{attributeName:"transform",type:"rotate",values:"0 72 40;360 72 40",dur:"2s",repeatCount:"indefinite"})),
  c("g",null,// head tilt
    c("line",{x1:60,y1:23,x2:55,y2:20,stroke:L,strokeWidth:1.5}),
    c("animate",{attributeName:"opacity",values:"0;1;1;0",dur:"4s",repeatCount:"indefinite"}))
);
// 10: Dead Bug
case 10: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(25,85,4.5),// head
  ln(28,83,65,83),// torso flat
  c("g",null,// right arm extending overhead
    c("line",{x1:45,y1:81,x2:45,y2:60,stroke:L,strokeWidth:W,strokeLinecap:"round"}),
    c("animate",{attributeName:"y2",values:"70;45;70",dur:"3s",repeatCount:"indefinite"})),
  c("g",null,// left leg extending
    c("line",{x1:65,y1:83,x2:85,y2:70,stroke:L,strokeWidth:W,strokeLinecap:"round"}),
    c("animate",{attributeName:"x2",values:"75;95;75",dur:"3s",repeatCount:"indefinite"}),
    c("animate",{attributeName:"y2",values:"75;85;75",dur:"3s",repeatCount:"indefinite"})),
  ln(65,83,75,70),// other leg up (static 90°)
  ln(45,81,35,70),// other arm up (static)
  c("line",{x1:28,y1:88,x2:65,y2:88,stroke:A,strokeWidth:1,strokeDasharray:"2,2",opacity:.3})// floor contact line
);
// 11: Median Nerve Glide — hand positions
case 11: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},
  // Animated hand going through 6 positions
  c("g",{transform:"translate(30,15)"},
    c("rect",{x:15,y:20,width:30,height:40,rx:5,fill:"none",stroke:L,strokeWidth:1.5}),// palm
    c("g",null,// fingers extending
      c("line",{x1:22,y1:20,x2:22,y2:8,stroke:L,strokeWidth:2,strokeLinecap:"round"}),
      c("line",{x1:30,y1:20,x2:30,y2:5,stroke:L,strokeWidth:2,strokeLinecap:"round"}),
      c("line",{x1:38,y1:20,x2:38,y2:8,stroke:L,strokeWidth:2,strokeLinecap:"round"}),
      c("animate",{attributeName:"opacity",values:"0;1;1;0",dur:"5s",repeatCount:"indefinite"})),
    c("g",null,// wrist extension arrow
      c("path",{d:"M25 60 Q30 72 35 60",stroke:A,strokeWidth:1.5,fill:"none"}),
      c("animate",{attributeName:"opacity",values:"0;0;1;1;0",dur:"5s",repeatCount:"indefinite"}))),
  c("text",{x:60,y:92,fill:"#475569",fontSize:8,textAnchor:"middle"},"1→2→3→4→5→6")
);
// 12: Wall Angel
case 12: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,wall,
  ci(70,22,5),// head against wall
  ln(70,27,70,60),// torso
  ln(70,60,60,92),ln(70,60,80,92),// legs
  c("g",null,// arms W to Y
    c("line",{x1:70,y1:40,x2:55,y2:30,stroke:A,strokeWidth:W,strokeLinecap:"round"}),
    c("line",{x1:70,y1:40,x2:85,y2:30,stroke:A,strokeWidth:W,strokeLinecap:"round"}),
    c("animateTransform",{attributeName:"transform",type:"translate",values:"0,0;0,-12;0,0",dur:"3s",repeatCount:"indefinite"})),
  c("text",{x:92,y:55,fill:D,fontSize:7,writingMode:"vertical-rl"},"ściana")
);
// 13: Figure-4 Stretch
case 13: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  ci(20,82,4.5),// head
  ln(24,80,60,82),// torso flat
  ln(60,82,70,65),ln(70,65,60,55),// right leg: thigh up, shin crossed
  ln(60,82,75,70),ln(75,70,80,82),// left leg: knee bent, foot flat
  c("g",null,// hands pulling leg
    ln(50,75,65,68),
    c("animate",{attributeName:"opacity",values:".5;1;.5",dur:"3s",repeatCount:"indefinite"})),
  c("text",{x:65,y:52,fill:A,fontSize:6,opacity:.5},"4")
);
// 14: Squat-to-Stand
case 14: return c("svg",{viewBox:"0 0 120 100",width:120,height:100},floor,
  c("g",null,
    ci(60,25,5),// head

function Settings(){
  const[perm,setPerm]=useState(nPerm());
  const[on,setOn]=useState(S.g('non',false));
  const cfg=S.g('ncfg',{mins:90,qs:21,qe:9});
  const[mins,setMins]=useState(cfg.mins||90);
  const[qs,setQs]=useState(cfg.qs!=null?cfg.qs:21);
  const[qe,setQe]=useState(cfg.qe!=null?cfg.qe:9);

  useEffect(()=>{if(on&&perm==='granted')startN({mins,qs,qe})},[]);

  const toggle=()=>{
    if(!on){
      if(perm!=='granted'){nReq(p=>{setPerm(p);if(p==='granted'){startN({mins,qs,qe});setOn(true)}})}
      else{startN({mins,qs,qe});setOn(true)}
    }else{stopN();setOn(false)}
  };
  const upd=(m,q1,q2)=>{setMins(m);setQs(q1);setQe(q2);const c={mins:m,qs:q1,qe:q2};S.s('ncfg',c);if(on)startN(c)};

  return h("div",null,
    // Toggle card
    h("div",{className:"nc"},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
        h("div",null,
          h("div",{style:{fontSize:15,fontWeight:700}},"⚡ Przypomnienia"),
          h("div",{style:{fontSize:12,color:"#64748b",marginTop:2}},on?"Aktywne — co "+mins+" min":"Wyłączone")),
        h("button",{onClick:toggle,style:{width:52,height:28,borderRadius:14,padding:2,background:on?"#22c55e":"rgba(255,255,255,.1)",transition:".3s",display:"flex",alignItems:"center"}},
          h("div",{style:{width:24,height:24,borderRadius:12,background:"#fff",transition:".3s",transform:on?"translateX(24px)":""}}))),
      perm==='denied'&&h("div",{style:{fontSize:12,color:"#f87171",padding:8,background:"rgba(248,113,113,.08)",borderRadius:8}},"⚠ Zablokowane. Odblokuj: kłódka → Powiadomienia → Zezwalaj."),
      perm==='unavailable'&&h("div",{style:{fontSize:12,color:"#eab308",padding:8,background:"rgba(234,179,8,.08)",borderRadius:8}},"⚠ Przeglądarka nie obsługuje powiadomień.")),

    // Interval
    on&&h("div",{className:"nc"},
      h("div",{style:{fontSize:13,fontWeight:700,marginBottom:12}},"Częstotliwość"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}},
        [45,60,90,120].map(m=>h("button",{key:m,onClick:()=>upd(m,qs,qe),style:{padding:"10px 6px",borderRadius:10,fontSize:13,fontWeight:600,background:mins===m?"rgba(110,231,183,.15)":"rgba(255,255,255,.04)",color:mins===m?"#6ee7b7":"#94a3b8"}},m+" min")))),

    // Quiet hours
    on&&h("div",{className:"nc"},
      h("div",{style:{fontSize:13,fontWeight:700,marginBottom:4}},"🌙 Godziny ciszy"),
      h("div",{style:{fontSize:12,color:"#64748b",marginBottom:12}},"Powiadomienia NIE będą wysyłane w tych godzinach."),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}},
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#64748b",marginBottom:4}},"Od"),
          h("div",{style:{display:"flex",gap:4}},
            [20,21,22,23].map(v=>h("button",{key:v,onClick:()=>upd(mins,v,qe),style:{padding:"8px 10px",borderRadius:8,fontSize:13,fontWeight:600,background:qs===v?"rgba(139,92,246,.2)":"rgba(255,255,255,.04)",color:qs===v?"#a78bfa":"#64748b"}},v+":00")))),
        h("div",{style:{fontSize:18,color:"#475569"}},"→"),
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#64748b",marginBottom:4}},"Do"),
          h("div",{style:{display:"flex",gap:4}},
            [7,8,9,10].map(v=>h("button",{key:v,onClick:()=>upd(mins,qs,v),style:{padding:"8px 10px",borderRadius:8,fontSize:13,fontWeight:600,background:qe===v?"rgba(139,92,246,.2)":"rgba(255,255,255,.04)",color:qe===v?"#a78bfa":"#64748b"}},v+":00")))))),

    // Sound test
    h("div",{className:"nc"},
      h("div",{style:{fontSize:13,fontWeight:700,marginBottom:8}},"🔊 Dźwięk timera"),
      h("div",{style:{fontSize:12,color:"#64748b",marginBottom:12}},"Potrójny sygnał 880 Hz + wibracja po zakończeniu każdego timera."),
      h("button",{onClick:beep,style:{padding:"8px 16px",borderRadius:8,fontSize:12,fontWeight:600,background:"rgba(255,255,255,.06)",color:"#94a3b8"}},"▶ Testuj")))
}
